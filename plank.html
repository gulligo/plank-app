<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>용용이 플랭크</title>
<style>
:root{
  --bg:#f4f7ff;
  --card:#ffffff;
  --text:#2f3440;
  --muted:#8b94a7;
  --line:#e2e8f5;
  --blue1:#5b8fff;
  --blue2:#9b8cff;
  --red1:#ff5f6d;
  --red2:#ff8a2a;
  --green:#16c47f;
  --soft:#eef3ff;
  --shadow:0 10px 26px rgba(71,102,190,.10);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
body{
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}
.top-tabs{
  position:sticky;top:0;z-index:30;
  display:flex;
  background:#fff;
  border-bottom:1px solid var(--line);
}
.top-tabs button{
  flex:1;
  border:none;
  background:none;
  padding:12px 8px;
  font-size:15px;
  font-weight:900;
  color:#6c7486;
}
.top-tabs button.active{color:var(--blue1)}
.page{display:none;padding:10px 10px 180px}
.page.active{display:block}
.card{
  background:var(--card);
  border-radius:18px;
  box-shadow:var(--shadow);
  padding:12px 14px;
  margin-bottom:10px;
}
.label{
  font-size:12px;
  color:var(--muted);
  font-weight:800;
}
.section-title{
  font-size:15px;
  font-weight:900;
  color:#444;
}
.goal-row{
  display:flex;
  align-items:center;
  gap:8px;
  margin-top:6px;
}
.goal-input{
  width:100px;
  height:38px;
  border-radius:12px;
  border:2px solid var(--line);
  background:#f7f9ff;
  text-align:center;
  font-size:18px;
  font-weight:900;
  color:#445;
}
.goal-right{
  margin-left:auto;
  font-size:15px;
  font-weight:900;
  color:#666;
}
.scale-wrap{margin-top:6px}
.scale-bar-shell{
  position:relative;
  width:100%;
  padding-top:8px;
}
.scale-bar-bg{
  position:relative;
  width:100%;
  height:18px;
  border-radius:999px;
  background:#e6ecfb;
  overflow:hidden;
}
.scale-bar-fill{
  position:absolute;
  left:0;
  top:0;
  height:100%;
  width:0%;
  border-radius:999px;
  background:linear-gradient(90deg,var(--blue1),var(--blue2));
  transition:width .18s linear, background .18s linear;
}
.best-marker{
  position:absolute;
  top:2px;
  width:3px;
  height:30px;
  border-radius:999px;
  background:#ff2f2f;
  box-shadow:0 0 0 1px rgba(255,255,255,.6);
}
.scale-ticks{
  position:relative;
  height:22px;
  margin-top:6px;
}
.tick{
  position:absolute;
  transform:translateX(-50%);
  font-size:11px;
  color:#7a8398;
  font-weight:900;
}
.tick-line{
  position:absolute;
  top:-7px;
  left:50%;
  transform:translateX(-50%);
  width:2px;
  height:6px;
  border-radius:999px;
  background:#c9d4ee;
}
.best-label{
  margin-top:6px;
  font-size:12px;
  font-weight:900;
  color:#ff4040;
  text-align:right;
}
.timer-card{padding-top:14px;padding-bottom:14px}
.timer-wrap{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}
.ring-hit{
  position:relative;
  width:256px;
  height:256px;
  cursor:pointer;
  user-select:none;
}
.ring-svg{
  width:256px;
  height:256px;
  transform:rotate(-90deg);
}
.ring-bg{fill:none;stroke:#e7edfb;stroke-width:16}
.ring-progress{fill:none;stroke-width:16;stroke-linecap:round;transition:stroke-dashoffset .18s linear, stroke .18s linear}
.ring-over{fill:none;stroke-width:16;stroke-linecap:round;transition:stroke-dashoffset .18s linear, stroke .18s linear}
.timer-center{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  width:180px;
  height:180px;
  border-radius:50%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
}
.timer-display{
  font-size:56px;
  font-weight:900;
  color:var(--blue1);
  line-height:1;
  transition:color .18s linear;
}
.timer-sub{
  margin-top:8px;
  font-size:13px;
  color:#8c94a5;
  font-weight:800;
  line-height:1.4;
  min-height:36px;
}
.touch-guide{
  margin-top:12px;
  font-size:13px;
  color:#7e8798;
  font-weight:800;
}
.stat-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}
.stat-card{
  background:#fff;
  border-radius:14px;
  padding:12px;
  text-align:center;
  border:1px solid #edf2fd;
}
.stat-label{
  font-size:11px;
  color:#9aa4ba;
  margin-bottom:4px;
  font-weight:800;
}
.stat-value{
  font-size:24px;
  font-weight:900;
}
.blue{color:var(--blue1)}
.orange{color:#ff8a2a}
.green{color:var(--green)}
.purple{color:#8a72ff}
.cal-header,.graph-nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}
.nav-btn{
  width:52px;
  height:52px;
  border:none;
  border-radius:14px;
  background:#eef3ff;
  color:var(--blue1);
  font-size:24px;
  font-weight:900;
}
.center-head{text-align:center}
.head-title{
  font-size:16px;
  font-weight:900;
  color:#444;
}
.head-sub{
  margin-top:3px;
  display:flex;
  justify-content:center;
  gap:12px;
  font-size:12px;
  color:#8b94a7;
  font-weight:800;
}
.cal-heads{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:4px;
  margin-bottom:4px;
}
.cal-head{
  text-align:center;
  font-size:11px;
  color:#7a8294;
  font-weight:900;
}
.calendar-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px 4px;
}
.day{
  min-height:66px;
  border-radius:12px;
  background:#f7f9ff;
  padding:4px 2px 6px;
  text-align:center;
  display:flex;
  flex-direction:column;
  align-items:center;
}
.day.empty{
  background:transparent;
}
.day-num{
  font-size:11px;
  font-weight:900;
  color:#798399;
  line-height:1;
}
.day-bubble-wrap{
  flex:1;
  width:100%;
  display:flex;
  align-items:center;
  justify-content:center;
}
.day-bubble{
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(180deg,#bcd0ff,#a6bbff);
  color:#3258cc;
  font-weight:900;
  transition:width .18s,height .18s;
}
.day-count{
  min-height:12px;
  font-size:10px;
  font-weight:900;
  color:#738fd8;
  line-height:1.1;
}
.graph-tabs{
  display:flex;
  gap:8px;
  margin-bottom:10px;
}
.chip{
  border:none;
  border-radius:999px;
  padding:10px 16px;
  background:#eef3ff;
  color:#667086;
  font-weight:900;
  font-size:14px;
}
.chip.active{
  background:var(--blue1);
  color:#fff;
}
.graph-container{
  display:flex;
  gap:6px;
  height:308px;
}
.y-axis{
  width:34px;
  height:280px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  align-items:flex-end;
  padding-right:2px;
  font-size:10px;
  color:#98a2b6;
  font-weight:800;
}
.chart-wrap{
  flex:1;
  height:280px;
  overflow-x:auto;
  overflow-y:hidden;
  display:flex;
  align-items:flex-end;
  gap:2px;
  background-image:linear-gradient(#e8eefb 1px, transparent 1px);
  background-size:100% 70px;
}
.bar-item{
  min-width:18px;
  flex:1;
  text-align:center;
}
.bar-val{
  font-size:8px;
  color:#5d667c;
  min-height:12px;
  margin-bottom:2px;
  font-weight:900;
}
.bar-col{
  width:100%;
  min-height:2px;
  border-radius:3px 3px 0 0;
  background:linear-gradient(180deg,var(--blue2),var(--blue1));
}
.bar-lbl{
  font-size:8px;
  color:#667086;
  margin-top:3px;
  font-weight:900;
}
.settings-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px 0;
  border-bottom:1px solid #f0f4ff;
}
.settings-row:last-child{border-bottom:none}
.toggle{
  width:56px;
  height:32px;
  border:none;
  border-radius:999px;
  background:#d7deee;
  position:relative;
}
.toggle::after{
  content:"";
  position:absolute;
  width:24px;
  height:24px;
  left:4px;
  top:4px;
  border-radius:50%;
  background:#fff;
  transition:.2s;
}
.toggle.on{background:var(--blue1)}
.toggle.on::after{left:28px}
.notice{
  position:fixed;
  left:50%;
  bottom:90px;
  transform:translateX(-50%);
  background:rgba(31,35,44,.94);
  color:#fff;
  border-radius:999px;
  padding:10px 18px;
  font-size:13px;
  font-weight:800;
  opacity:0;
  pointer-events:none;
  transition:.18s;
  z-index:200;
  white-space:nowrap;
  max-width:88vw;
}
.notice.show{opacity:1}
.confetti-container{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:300;
  overflow:hidden;
}
.confetti{
  position:absolute;
  top:-20px;
  opacity:0;
  animation:fall 2.8s ease-in forwards;
}
@keyframes fall{
  0%{transform:translateY(0) rotate(0deg);opacity:1}
  100%{transform:translateY(110vh) rotate(760deg);opacity:0}
}
@media (max-width:420px){
  .ring-hit{width:230px;height:230px}
  .ring-svg{width:230px;height:230px}
  .timer-center{width:162px;height:162px}
  .timer-display{font-size:48px}
}
</style>
</head>
<body>

<div class="top-tabs">
  <button class="tab active" data-page="home">플랭크</button>
  <button class="tab" data-page="calendar">달력</button>
  <button class="tab" data-page="graph">그래프</button>
  <button class="tab" data-page="settings">설정</button>
</div>

<div id="home" class="page active">
  <div class="card">
    <div class="label">목표 시간</div>
    <div class="goal-row">
      <input id="goalInput" class="goal-input" type="number" min="1" step="1" value="65" />
      <span class="label" style="font-size:13px">초</span>
      <div id="goalText" class="goal-right">기본 65초</div>
    </div>

    <div class="scale-wrap">
      <div class="scale-bar-shell">
        <div class="scale-bar-bg">
          <div id="scaleFill" class="scale-bar-fill"></div>
        </div>
        <div id="bestMarker" class="best-marker" style="left:0%"></div>
      </div>
      <div id="scaleTicks" class="scale-ticks"></div>
      <div id="bestLabel" class="best-label">최고기록 0초</div>
    </div>
  </div>

  <div class="card timer-card">
    <div class="timer-wrap">
      <div id="ringHit" class="ring-hit">
        <svg class="ring-svg" viewBox="0 0 256 256">
          <defs>
            <linearGradient id="ringGradBlue" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#5b8fff"></stop>
              <stop offset="100%" stop-color="#9b8cff"></stop>
            </linearGradient>
            <linearGradient id="ringGradRed" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#ff5f6d"></stop>
              <stop offset="100%" stop-color="#ff8a2a"></stop>
            </linearGradient>
          </defs>
          <circle class="ring-bg" cx="128" cy="128" r="104"></circle>
          <circle id="ringProgress" class="ring-progress" cx="128" cy="128" r="104"
            stroke="url(#ringGradBlue)"
            stroke-dasharray="653.451" stroke-dashoffset="653.451"></circle>
          <circle id="ringOver" class="ring-over" cx="128" cy="128" r="104"
            stroke="url(#ringGradRed)"
            stroke-dasharray="653.451" stroke-dashoffset="653.451"></circle>
        </svg>
        <div class="timer-center">
          <div id="timerDisplay" class="timer-display">0초</div>
          <div id="timerSub" class="timer-sub">원형을 누르면 시작합니다</div>
        </div>
      </div>
    </div>
  </div>
<div class="stat-grid">

  <!-- 1번: 한달/연평균 -->
  <div class="stat-card stat-card-double">
    <div class="stat-line">
      <span class="stat-line-label">한달평균</span>
      <span class="stat-colon">:</span>
      <span id="monthAvg" class="stat-line-value blue">-</span>
    </div>
    <div class="stat-line">
      <span class="stat-line-label">연평균</span>
      <span class="stat-colon">:</span>
      <span id="yearAvg" class="stat-line-value purple">-</span>
    </div>
  </div>

  <!-- 2번 -->
  <div class="stat-card">
    <div class="stat-label">최고 기록</div>
    <div id="bestRecord" class="stat-value orange">-</div>
  </div>

  <!-- 3번 -->
  <div class="stat-card">
    <div class="stat-label">현재 연속</div>
    <div id="currentStreak" class="stat-value green">0일</div>
  </div>

  <!-- 4번 -->
  <div class="stat-card">
    <div class="stat-label">최고 연속</div>
    <div id="bestStreak" class="stat-value purple">0일</div>
  </div>

</div>

<div id="calendar" class="page">
  <div class="card">
    <div class="cal-header">
      <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
      <div class="center-head">
        <div id="calTitle" class="head-title"></div>
        <div class="head-sub">
          <span>최고 <span id="calMax" style="color:#ff8a2a">-</span></span>
          <span>합계 <span id="calSum" style="color:#5b8fff">-</span></span>
        </div>
      </div>
      <button class="nav-btn" onclick="changeMonth(1)">›</button>
    </div>

    <div class="cal-heads">
      <div class="cal-head">일</div><div class="cal-head">월</div><div class="cal-head">화</div>
      <div class="cal-head">수</div><div class="cal-head">목</div><div class="cal-head">금</div><div class="cal-head">토</div>
    </div>

    <div id="calendarGrid" class="calendar-grid"></div>
  </div>
</div>

<div id="graph" class="page">
  <div class="card">
    <div class="graph-tabs">
      <button class="chip graph-chip active" data-graph="day">일</button>
      <button class="chip graph-chip" data-graph="month">월</button>
      <button class="chip graph-chip" data-graph="year">년</button>
    </div>

    <div class="graph-nav">
      <button class="nav-btn" onclick="changeGraph(-1)">‹</button>
      <div class="center-head">
        <div id="graphLabel" class="head-title"></div>
        <div class="head-sub">
          <span>최고 <span id="graphMax" style="color:#ff8a2a">-</span></span>
          <span>합계 <span id="graphSum" style="color:#5b8fff">-</span></span>
        </div>
      </div>
      <button class="nav-btn" onclick="changeGraph(1)">›</button>
    </div>

    <div class="graph-container">
      <div class="y-axis">
        <div id="yTop">0</div>
        <div id="yMid2">0</div>
        <div id="yMid1">0</div>
        <div id="yBottom">0</div>
      </div>
      <div id="chartWrap" class="chart-wrap"></div>
    </div>
  </div>
</div>

<div id="settings" class="page">
  <div class="card">
    <div class="settings-row">
      <div class="section-title">진동</div>
      <button id="togVibrate" class="toggle on" onclick="toggleSetting('vibrate')"></button>
    </div>
    <div class="settings-row">
      <div class="section-title">음성 알림</div>
      <button id="togSound" class="toggle on" onclick="toggleSetting('sound')"></button>
    </div>
    <div class="settings-row">
      <button onclick="backupData()" style="border:none;background:#eef3ff;color:#5b8fff;font-weight:900;padding:10px 18px;border-radius:999px;font-size:14px">기록 백업</button>
      <button onclick="restoreData()" style="border:none;background:#eef3ff;color:#5b8fff;font-weight:900;padding:10px 18px;border-radius:999px;font-size:14px">기록 복구</button>
    </div>
  </div>
</div>

<input type="file" id="restoreFile" style="display:none" />
<div id="notice" class="notice"></div>

<script>
const KEY = 'yongyong_plank_final_v1';
const CIRC = 2 * Math.PI * 104;
const defaultData = {
  records: {},
  goalSec: 65,
  graphMode: 'day',
  settings: {
    vibrate: true,
    sound: true
  }
};

function clone(v){ return JSON.parse(JSON.stringify(v)); }

function loadData(){
  try{
    const raw = localStorage.getItem(KEY);
    if(!raw) return clone(defaultData);
    const parsed = JSON.parse(raw);
    return {
      ...clone(defaultData),
      ...parsed,
      settings: { ...defaultData.settings, ...(parsed.settings || {}) }
    };
  }catch(e){
    return clone(defaultData);
  }
}
const data = loadData();

let running = false;
let countdowning = false;
let timerInterval = null;
let countdownTimeout = null;
let elapsed = 0;
let goalReached = false;
let said60 = false;
let said30 = false;
let currentPage = 'home';
let calViewDate = new Date();
let graphViewDate = new Date();

function ymd(d = new Date()){
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function saveData(){
  localStorage.setItem(KEY, JSON.stringify(data));
}
function showNotice(text){
  const el = document.getElementById('notice');
  el.textContent = text;
  el.classList.add('show');
  clearTimeout(showNotice._t);
  showNotice._t = setTimeout(() => el.classList.remove('show'), 1800);
}
function speak(text){
  if(!data.settings.sound) return;
  try{
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ko-KR';
    u.rate = 0.85;
    u.pitch = 1.0;
    const doSpeak = () => {
      const voices = speechSynthesis.getVoices();
      const ko = voices.find(v => (v.lang||'').toLowerCase().includes('ko'));
      if(ko) u.voice = ko;
      speechSynthesis.speak(u);
    };
    if(speechSynthesis.getVoices().length === 0){
      speechSynthesis.onvoiceschanged = doSpeak;
    }else{
      doSpeak();
    }
  }catch(e){}
}
function vibrate(pattern){
  if(data.settings.vibrate && navigator.vibrate) navigator.vibrate(pattern);
}
function launchConfetti(){
  const box = document.createElement('div');
  box.className = 'confetti-container';
  document.body.appendChild(box);
  const colors = ['#5b8fff','#9b8cff','#ff8a2a','#ff5f6d','#15c47e'];
  for(let i=0;i<80;i++){
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random()*100 + '%';
    c.style.width = (Math.random()*8 + 6) + 'px';
    c.style.height = (Math.random()*12 + 8) + 'px';
    c.style.background = colors[Math.floor(Math.random()*colors.length)];
    c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    c.style.animationDelay = Math.random()*1.1 + 's';
    c.style.animationDuration = (Math.random()*1.4 + 2.1) + 's';
    box.appendChild(c);
  }
  setTimeout(() => box.remove(), 4200);
}
function formatSec(sec){
  return `${Math.max(0, Math.floor(sec))}초`;
}
function getTodayRecord(){
  return data.records[ymd()] || 0;
}
function getBestRecord(){
  const vals = Object.values(data.records);
  return vals.length ? Math.max(...vals) : 0;
}
function getTotal(){
  return Object.values(data.records).reduce((a,b) => a + b, 0);
}
function calcStreaks(){
  const keys = Object.keys(data.records).filter(k => data.records[k] > 0).sort();
  if(!keys.length) return { current:0, best:0 };

  let best = 1;
  let cur = 1;
  for(let i=1;i<keys.length;i++){
    const diff = (new Date(keys[i]) - new Date(keys[i-1])) / 86400000;
    if(diff === 1){
      cur++;
      if(cur > best) best = cur;
    }else{
      cur = 1;
    }
  }

  let current = 0;
  const today = new Date();
  today.setHours(0,0,0,0);
  for(let i=0;;i++){
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    if((data.records[ymd(d)] || 0) > 0) current++;
    else break;
  }

  return { current, best };
}
function getScaleMax(){
  const best = Math.max(getBestRecord(), data.goalSec, 65);
  return Math.max(20, Math.ceil((best * 1.2) / 20) * 20);
}
function isDangerZone(){
  const remaining = data.goalSec - elapsed;
  return running && remaining <= 30;
}
function getMainGradient(){
  return isDangerZone() || (running && elapsed > data.goalSec)
    ? 'linear-gradient(90deg,var(--red1),var(--red2))'
    : 'linear-gradient(90deg,var(--blue1),var(--blue2))';
}
function updateScaleBar(){
  const scaleMax = getScaleMax();
  const best = getBestRecord();
  const current = elapsed;

  const fillPct = Math.min(100, (current / scaleMax) * 100);
  const bestPct = Math.min(100, (best / scaleMax) * 100);

  const fill = document.getElementById('scaleFill');
  const marker = document.getElementById('bestMarker');
  fill.style.width = fillPct + '%';
  fill.style.background = getMainGradient();
  marker.style.left = bestPct + '%';

  document.getElementById('bestLabel').textContent = `최고기록 ${best}초`;

  const ticksWrap = document.getElementById('scaleTicks');
  ticksWrap.innerHTML = '';
  for(let v=20; v<=scaleMax; v+=20){
    const t = document.createElement('div');
    t.className = 'tick';
    t.style.left = ((v / scaleMax) * 100) + '%';
    t.innerHTML = `<div class="tick-line"></div>${v}`;
    ticksWrap.appendChild(t);
  }
}
function updateRing(){
  const goal = Math.max(1, data.goalSec);
  const ring = document.getElementById('ringProgress');
  const over = document.getElementById('ringOver');
  const timerDisplay = document.getElementById('timerDisplay');

  timerDisplay.style.color = (isDangerZone() || (running && elapsed > goal)) ? '#ff5f6d' : '#5b8fff';

  if(elapsed <= goal){
    const pct = elapsed / goal;
    ring.setAttribute('stroke', isDangerZone() ? 'url(#ringGradRed)' : 'url(#ringGradBlue)');
    ring.style.strokeDashoffset = String(CIRC * (1 - pct));
    over.style.strokeDashoffset = String(CIRC);
  }else{
    ring.setAttribute('stroke', 'url(#ringGradRed)');
    ring.style.strokeDashoffset = '0';
    const overElapsed = elapsed - goal;
    const overPct = (overElapsed % goal) / goal;
    over.style.strokeDashoffset = String(CIRC * (1 - overPct));
  }
}
function updateDisplay(){
  document.getElementById('timerDisplay').textContent = formatSec(elapsed);
  document.getElementById('goalText').textContent = `목표 ${data.goalSec}초`;
  updateRing();
  updateScaleBar();
}
function saveTodayRecord(sec){
  const key = ymd();
  const prev = data.records[key] || 0;
  if(sec > prev){
    data.records[key] = sec;
    saveData();
    return true;
  }
  return false;
}
function finishWorkout(){
  running = false;
  clearInterval(timerInterval);
  timerInterval = null;

  const saved = saveTodayRecord(elapsed);
  speak('종료');
  vibrate([120,70,180]);

  if(saved){
    showNotice('기록 저장');
    if(elapsed >= data.goalSec){
      launchConfetti();
    }
  }else{
    showNotice('오늘 더 긴 기록이 저장되어 있습니다');
  }

  document.getElementById('timerSub').textContent = '원형을 누르면 다시 시작합니다';
  renderStats();
  renderCalendar();
  renderChart();
  updateDisplay();
}
function checkAnnouncements(){
  const remaining = data.goalSec - elapsed;

  if(!said60 && remaining === 60){
    said60 = true;
    speak('60초 남았습니다');
    vibrate([60,40,60]);
  }
  if(!said30 && remaining === 30){
    said30 = true;
    speak('30초 남았습니다');
    vibrate([60,40,60,40,60]);
  }

  if(!goalReached && elapsed >= data.goalSec){
    goalReached = true;
    speak('목표 달성');
    vibrate([100,50,100,50,200]);
    showNotice('목표 달성');
    launchConfetti();
  }
}
function startRealTimer(){
  running = true;
  countdowning = false;
  elapsed = 1;
  goalReached = elapsed >= data.goalSec;
  said60 = (data.goalSec - elapsed) < 60;
  said30 = (data.goalSec - elapsed) < 30;

  document.getElementById('timerSub').textContent = '원형 안쪽을 누르면 종료합니다';
  updateDisplay();
  checkAnnouncements();

  timerInterval = setInterval(() => {
    elapsed++;
    updateDisplay();
    checkAnnouncements();
  }, 1000);
}
function startCountdown(){
  if(running || countdowning) return;
  countdowning = true;
  elapsed = 0;
  updateDisplay();

  const steps = ['3','2','1','시작'];
  let idx = 0;
  document.getElementById('timerSub').textContent = '곧 시작합니다';
  document.getElementById('timerDisplay').textContent = steps[idx];
  speak(steps[idx]);
  vibrate(70);

  function next(){
    idx++;
    if(idx < steps.length){
      document.getElementById('timerDisplay').textContent = steps[idx];
      if(idx < 3){
        speak(steps[idx]);
        vibrate(70);
      }else{
        speak('시작');
        vibrate([90,40,120]);
      }
      countdownTimeout = setTimeout(next, 1000);
    }else{
      startRealTimer();
    }
  }
  countdownTimeout = setTimeout(next, 1000);
}
function stopWorkout(){
  if(countdowning){
    countdowning = false;
    clearTimeout(countdownTimeout);
    countdownTimeout = null;
    document.getElementById('timerDisplay').textContent = '0초';
    document.getElementById('timerSub').textContent = '원형을 누르면 시작합니다';
    updateDisplay();
    return;
  }
  if(!running) return;
  finishWorkout();
}
function onRingTap(e){
  const rect = document.getElementById('ringHit').getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const cx = rect.width / 2;
  const cy = rect.height / 2;
  const dist = Math.sqrt((x-cx)*(x-cx) + (y-cy)*(y-cy));
  const innerRadius = rect.width * 0.35;

  if(running){
    if(dist <= innerRadius){
      stopWorkout();
    }
    return;
  }
  if(!countdowning){
    startCountdown();
  }
}
function renderStats(){
  const today = getTodayRecord();
  const best = getBestRecord();
  const streak = calcStreaks();

  document.getElementById('todayRecord').textContent = today > 0 ? formatSec(today) : '-';
  document.getElementById('bestRecord').textContent = best > 0 ? formatSec(best) : '-';
  document.getElementById('currentStreak').textContent = streak.current + '일';
  document.getElementById('bestStreak').textContent = streak.best + '일';
}
function bubbleSize(sec, maxSec){
  if(sec <= 0) return 0;
  const minBase = 10;    // 60초일 때 점보다 조금 큰 크기
  const maxBase = 38;
  if(sec <= 60) return minBase;
  const ratio = (sec - 60) / Math.max(1, maxSec - 60);
  return Math.round(minBase + (maxBase - minBase) * Math.min(1, ratio));
}
function renderCalendar(){
  const grid = document.getElementById('calendarGrid');
  grid.innerHTML = '';

  const y = calViewDate.getFullYear();
  const m = calViewDate.getMonth();
  const firstDay = new Date(y, m, 1).getDay();
  const lastDate = new Date(y, m + 1, 0).getDate();

  const monthPrefix = `${y}-${String(m+1).padStart(2,'0')}-`;
  const monthKeys = Object.keys(data.records).filter(k => k.startsWith(monthPrefix));
  const monthVals = monthKeys.map(k => data.records[k]);
  const monthMax = monthVals.length ? Math.max(...monthVals) : 0;
  const monthSum = monthVals.reduce((a,b) => a+b, 0);

  document.getElementById('calTitle').textContent = `${y}년 ${m+1}월`;
  document.getElementById('calMax').textContent = monthMax > 0 ? formatSec(monthMax) : '-';
  document.getElementById('calSum').textContent = monthSum > 0 ? formatSec(monthSum) : '-';

  for(let i=0;i<firstDay;i++){
    const empty = document.createElement('div');
    empty.className = 'day empty';
    grid.appendChild(empty);
  }

  const todayKey = ymd();

  for(let d=1; d<=lastDate; d++){
    const key = ymd(new Date(y, m, d));
    const sec = data.records[key] || 0;

    const day = document.createElement('div');
    day.className = 'day';

    const num = document.createElement('div');
    num.className = 'day-num';
    num.textContent = d;

    const wrap = document.createElement('div');
    wrap.className = 'day-bubble-wrap';

    const bubble = document.createElement('div');
    bubble.className = 'day-bubble';

    if(sec > 0){
      const size = bubbleSize(sec, monthMax || 60);
      bubble.style.width = size + 'px';
      bubble.style.height = size + 'px';
    }else{
      bubble.style.width = '0px';
      bubble.style.height = '0px';
      bubble.style.background = 'transparent';
    }

    if(key === todayKey){
      day.style.outline = '2px solid #84a5ff';
      day.style.outlineOffset = '-2px';
    }

    const cnt = document.createElement('div');
    cnt.className = 'day-count';
    cnt.textContent = sec > 0 ? `${sec}` : '';

    wrap.appendChild(bubble);
    day.appendChild(num);
    day.appendChild(wrap);
    day.appendChild(cnt);
    grid.appendChild(day);
  }
}
function getDailySeries(){
  const y = graphViewDate.getFullYear();
  const m = graphViewDate.getMonth();
  const last = new Date(y, m + 1, 0).getDate();
  const arr = [];
  for(let d=1; d<=last; d++){
    const key = ymd(new Date(y, m, d));
    arr.push({ label: d, value: data.records[key] || 0 });
  }
  return arr;
}
function getMonthlySeries(){
  const y = graphViewDate.getFullYear();
  const arr = [];
  for(let m=1; m<=12; m++){
    const prefix = `${y}-${String(m).padStart(2,'0')}-`;
    const sum = Object.keys(data.records)
      .filter(k => k.startsWith(prefix))
      .reduce((a,k) => a + data.records[k], 0);
    arr.push({ label: `${m}월`, value: sum });
  }
  return arr;
}
function getYearlySeries(){
  const nowY = new Date().getFullYear();
  const arr = [];
  for(let y=nowY-4; y<=nowY; y++){
    const sum = Object.keys(data.records)
      .filter(k => k.startsWith(String(y)))
      .reduce((a,k) => a + data.records[k], 0);
    arr.push({ label: `${y}`, value: sum });
  }
  return arr;
}
function renderChart(){
  const mode = data.graphMode || 'day';
  document.querySelectorAll('.graph-chip').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.graph === mode);
  });

  let arr = [];
  if(mode === 'day'){
    arr = getDailySeries();
    document.getElementById('graphLabel').textContent = `${graphViewDate.getFullYear()}년 ${graphViewDate.getMonth()+1}월`;
  }else if(mode === 'month'){
    arr = getMonthlySeries();
    document.getElementById('graphLabel').textContent = `${graphViewDate.getFullYear()}년`;
  }else{
    arr = getYearlySeries();
    document.getElementById('graphLabel').textContent = '연도별';
  }

  const sum = arr.reduce((a,b) => a+b.value, 0);
  const max = arr.length ? Math.max(...arr.map(v => v.value)) : 0;
  const chartMax = Math.max(60, Math.ceil(max * 1.15 / 20) * 20);

  document.getElementById('graphMax').textContent = max > 0 ? `${max}초` : '-';
  document.getElementById('graphSum').textContent = sum > 0 ? `${sum}초` : '-';

  document.getElementById('yTop').textContent = chartMax;
  document.getElementById('yMid2').textContent = Math.round(chartMax * 0.66);
  document.getElementById('yMid1').textContent = Math.round(chartMax * 0.33);
  document.getElementById('yBottom').textContent = 0;

  const wrap = document.getElementById('chartWrap');
  wrap.innerHTML = '';

  arr.forEach(item => {
    const h = item.value > 0 ? Math.max(3, Math.round((item.value / chartMax) * 250)) : 2;
    const div = document.createElement('div');
    div.className = 'bar-item';
    div.innerHTML = `
      <div class="bar-val">${item.value > 0 ? item.value : ''}</div>
      <div class="bar-col" style="height:${h}px"></div>
      <div class="bar-lbl">${item.label}</div>
    `;
    wrap.appendChild(div);
  });
}
function changeMonth(dir){
  calViewDate.setMonth(calViewDate.getMonth() + dir);
  renderCalendar();
}
function changeGraph(dir){
  const mode = data.graphMode || 'day';
  if(mode === 'day'){
    graphViewDate.setMonth(graphViewDate.getMonth() + dir);
  }else if(mode === 'month'){
    graphViewDate.setFullYear(graphViewDate.getFullYear() + dir);
  }else{
    graphViewDate.setFullYear(graphViewDate.getFullYear() + dir);
  }
  renderChart();
}
function toggleSetting(key){
  data.settings[key] = !data.settings[key];
  saveData();
  renderSettings();
}
function renderSettings(){
  document.getElementById('togVibrate').classList.toggle('on', data.settings.vibrate);
  document.getElementById('togSound').classList.toggle('on', data.settings.sound);
}
function backupData(){
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'plank_backup.json';
  a.click();
}
function restoreData(){
  document.getElementById('restoreFile').click();
}

document.getElementById('restoreFile').addEventListener('change', e => {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try{
      const parsed = JSON.parse(ev.target.result);
      Object.assign(data, clone(defaultData), parsed);
      data.settings = { ...defaultData.settings, ...(parsed.settings || {}) };
      saveData();
      document.getElementById('goalInput').value = data.goalSec;
      renderAll();
      showNotice('복구 완료');
    }catch(err){
      showNotice('복구 실패');
    }
  };
  reader.readAsText(file);
});

document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    currentPage = btn.dataset.page;
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(currentPage).classList.add('active');
  });
});

document.querySelectorAll('.graph-chip').forEach(btn => {
  btn.addEventListener('click', () => {
    data.graphMode = btn.dataset.graph;
    saveData();
    renderChart();
  });
});

document.getElementById('goalInput').addEventListener('change', e => {
  const v = Math.max(1, parseInt(e.target.value || '65', 10));
  data.goalSec = v;
  e.target.value = v;
  saveData();
  said60 = false;
  said30 = false;
  goalReached = false;
  updateDisplay();
  renderStats();
  renderChart();
});

document.getElementById('ringHit').addEventListener('click', onRingTap);

function renderAll(){
  renderStats();
  renderSettings();
  renderCalendar();
  renderChart();
  updateDisplay();
  document.getElementById('goalInput').value = data.goalSec;
  if(!running && !countdowning){
    document.getElementById('timerDisplay').textContent = formatSec(elapsed);
    document.getElementById('timerSub').textContent = '원형을 누르면 시작합니다';
  }
}
renderAll();
</script>
</body>

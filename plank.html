<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>플랭크 도전 - 용용님</title>
    <style>
        /* CSS: 스타일 디자인 */
        body { background: #121212; color: white; font-family: sans-serif; margin: 0; text-align: center; }
        .progress-container { width: 100%; height: 30px; background: #333; position: relative; }
        #progress-bar { width: 0%; height: 100%; background: #00ff88; transition: 0.3s; }
        #percent-text { position: absolute; right: 10px; top: 5px; font-weight: bold; }
        .circle-timer { position: relative; width: 250px; height: 250px; margin: 40px auto; }
        svg { transform: rotate(-90deg); }
        .base-circle { fill: none; stroke: #333; stroke-width: 15; }
        #moving-circle {
            fill: none; stroke: #00ff88; stroke-width: 15;
            stroke-dasharray: 691; stroke-dashoffset: 0;
            stroke-linecap: round; transition: 1s linear;
        }
        #display {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem; font-weight: bold;
        }
        .input-group { margin: 20px; font-size: 1.2rem; }
        input { width: 80px; padding: 10px; font-size: 1.2rem; border-radius: 5px; text-align: center; background: #222; color: white; border: 1px solid #444; }
        button { padding: 15px 30px; font-size: 1.2rem; margin: 10px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; }
        #startBtn { background: #00ff88; color: black; }
        #resetBtn { background: #555; color: white; }
    </style>
</head>
<body>

    <div class="progress-container">
        <div id="progress-bar"></div>
        <span id="percent-text">0%</span>
    </div>

    <div class="main-container">
        <h1 style="margin-top: 20px;">플랭크 도전</h1>
        
        <div class="circle-timer">
            <svg width="250" height="250">
                <circle cx="125" cy="125" r="110" class="base-circle"></circle>
                <circle cx="125" cy="125" r="110" id="moving-circle"></circle>
            </svg>
            <div id="display">대기</div>
        </div>

        <div class="input-group">
            <input type="number" id="targetInput" value="80"> 초 설정
        </div>

        <div class="controls">
            <button id="startBtn">운동 시작</button>
            <button id="resetBtn">초기화</button>
        </div>
    </div>

    <script>
        /* JavaScript: 핵심 로직 */
        let timer;
        let totalTime, timeLeft;
        const display = document.getElementById('display');
        const progressBar = document.getElementById('progress-bar');
        const percentText = document.getElementById('percent-text');
        const movingCircle = document.getElementById('moving-circle');
        const circleLength = 691; 

        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ko-KR';
            window.speechSynthesis.speak(msg);
        }

        document.getElementById('startBtn').addEventListener('click', () => {
            if (timer) return;
            
            totalTime = parseInt(document.getElementById('targetInput').value);
            timeLeft = totalTime;
            
            let ready = 3;
            // 시작 전 3, 2, 1 음성 및 화면 표시
            const readyInt = setInterval(() => {
                if (ready > 0) {
                    display.textContent = ready;
                    speak(ready);
                    ready--;
                } else {
                    clearInterval(readyInt);
                    display.textContent = "시작!";
                    speak("시작");
                    setTimeout(startPlank, 500);
                }
            }, 1000);
        });

        function startPlank() {
            timer = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    display.textContent = timeLeft + "초";
                    
                    let progress = ((totalTime - timeLeft) / totalTime) * 100;
                    progressBar.style.width = progress + "%";
                    percentText.textContent = Math.floor(progress) + "%";

                    let offset = circleLength - (progress / 100) * circleLength;
                    movingCircle.style.strokeDashoffset = offset;

                    // 색상 변경
                    if (progress > 80) {
                        progressBar.style.background = "#ff4444";
                        movingCircle.style.stroke = "#ff4444";
                    } else if (progress > 50) {
                        progressBar.style.background = "#ffbb00";
                        movingCircle.style.stroke = "#ffbb00";
                    }

                    // 음성 안내
                    if (timeLeft === 80 || timeLeft === 60 || timeLeft === 30) {
                        speak(timeLeft + "초 남았습니다");
                    }
                    if (timeLeft <= 5 && timeLeft > 0) {
                        speak(timeLeft);
                    }
                } else {
                    clearInterval(timer);
                    timer = null;
                    display.textContent = "성공!";
                    speak("목표 달성! 고생하셨습니다");
                    alert("목표 달성!");
                }
            }, 1000);
        }

        document.getElementById('resetBtn').addEventListener('click', () => {
            location.reload(); 
        });
    </script>
</body>
</html>
